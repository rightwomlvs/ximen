<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西門奇談書 - 智能聯動版</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg-dark: #121212;
            --container-bg: #1e1e1e;
            --neon-cyan: #00e5ff;
            --neon-magenta: #ff00ff;
            --neon-green: #39ff14;
            --neon-yellow: #ffff00;
            --text-main: #e0e0e0;
            --text-muted: #bbb;
        }

        body { 
            font-family: 'Microsoft JhengHei', 'Segoe UI', Tahoma, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding: clamp(10px, 2vw, 20px);
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
        }

        #game-container { 
            width: 100%; 
            max-width: 900px; 
            background: var(--container-bg); 
            min-height: 600px; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #333;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.1); 
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .header { 
            background: #0a0a0a; 
            padding: 20px; 
            text-align: center; 
            border-bottom: 2px solid var(--neon-cyan); 
            font-weight: bold; 
            font-size: 1.5rem;
            letter-spacing: 2px; 
            color: var(--neon-cyan); 
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); 
        }

        /* 對話區 */
        #dialog-view {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .story-area {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #2a2a2a 0%, #1e1e1e 100%);
        }

        .story-en {
            font-size: 1.3rem;
            color: var(--neon-cyan);
            margin-bottom: 15px;
            font-weight: bold;
            line-height: 1.5;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.2);
        }

        .story-zh {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 650px;
        }

        .options-area {
            padding: 30px;
            background: #111;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            border-top: 1px solid #333;
        }

        .btn-option {
            background: transparent;
            color: var(--neon-magenta);
            border: 2px solid var(--neon-magenta);
            padding: 15px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 0 8px rgba(255, 0, 255, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 60px;
        }

        .btn-option:hover {
            background: var(--neon-magenta);
            color: #000;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.7);
            transform: translateY(-2px);
        }

        /* 副本區 */
        #bingo-view {
            display: none;
            flex-direction: column;
            flex: 1;
            background: #181818;
            padding: 20px;
            align-items: center;
        }

        #export-area {
            background: #181818;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bingo-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .bingo-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }

        .bingo-subtitle {
            font-size: 1rem;
            color: #888;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .bingo-cell {
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid #444;
            border-radius: 8px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            overflow: hidden;
        }

        .bingo-cell:hover {
            transform: scale(1.05);
            background: rgba(50, 50, 50, 0.9);
            z-index: 2;
        }

        .bingo-cell.stamped {
            opacity: 0.3;
            filter: grayscale(100%);
            transform: scale(0.95);
        }

        .cell-type {
            font-size: clamp(0.6rem, 1.2vw, 0.75rem);
            margin-bottom: 4px;
        }

        .cell-desc {
            font-size: clamp(0.65rem, 1.3vw, 0.85rem);
            font-weight: bold;
            color: #fff;
            word-break: break-all;
            line-height: 1.3;
        }

        .theme-magenta { border-top: 3px solid var(--neon-magenta); }
        .theme-magenta .cell-type { color: var(--neon-magenta); }
        
        .theme-yellow { border-top: 3px solid var(--neon-yellow); }
        .theme-yellow .cell-type { color: var(--neon-yellow); }
        
        .theme-cyan { border-top: 3px solid var(--neon-cyan); }
        .theme-cyan .cell-type { color: var(--neon-cyan); }
        
        .theme-green { border-top: 3px solid var(--neon-green); }
        .theme-green .cell-type { color: var(--neon-green); }

        .theme-white { 
            border: 2px solid #fff; 
            background: #2a2a2a; 
        }
        .theme-white .cell-type, .theme-white .cell-desc { color: #fff; }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .btn-regenerate, .btn-save {
            background: transparent;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-regenerate {
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
        }

        .btn-regenerate:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.7);
        }

        .btn-save {
            color: var(--neon-magenta);
            border: 2px solid var(--neon-magenta);
        }

        .btn-save:hover {
            background: var(--neon-magenta);
            color: #000;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.7);
        }

        @media (max-width: 768px) {
            .options-area { grid-template-columns: 1fr; }
            .bingo-grid { gap: 6px; }
            .btn-regenerate, .btn-save { width: 100%; }
        }
    </style>
</head>
<body>

<div id="game-container">

</div>

    // 決策流地圖：納入全新飲食三階段調查

    function shuffleArray(array) {
        let curId = array.length;
        while (0 !== curId) {
            let randId = Math.floor(Math.random() * curId);
            curId -= 1;
            let tmp = array[curId];
            array[curId] = array[randId];
            array[randId] = tmp;
        }
        return array;
    }

    function renderNode(nodeId) {

            generateBingoCard();

        dialogView.style.display = 'flex';
        bingoView.style.display = 'none';

        const zhEl = document.getElementById("text-zh");

        zhEl.style.opacity = '0';
        
        setTimeout(() => {
            enEl.innerText = node.en;

            enEl.style.transition = 'opacity 0.4s ease';
            zhEl.style.transition = 'opacity 0.4s ease';

        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";

        node.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "btn-option";
            btn.innerText = opt.text;
            btn.onclick = () => {
                // 如果該節點有定義儲存變數的Key，紀錄玩家的選擇
                if (node.key && opt.data) {
                    userChoices[node.key] = opt.data;
                }
                renderNode(opt.target);
            };
            optionsContainer.appendChild(btn);
        });
    }

    // 關鍵升級：權重動態算分與絕對去重生成演算法
    function getFilteredAndScoredPool(poolId) {
        let items = [...taskPools[poolId]];

        // 1. 嚴格素食過濾機制
        if (userChoices.dietVeg === "veg") {
            // 如果玩家選素食，100% 排除帶有 'meat-only' 標籤的任務
            items = items.filter(item => !item.tags.includes("meat-only"));
        }

        // 2. 聯動算分機制
        let scoredItems = items.map(item => {
            let score = Math.random() * 0.3; // 加入極小隨機亂數，避免同分時排序死板

            // 根據玩家選擇的主題權重加分 (+5)
            if (userChoices.theme === "History" && item.tags.includes("history")) score += 5;
            if (userChoices.theme === "Subculture" && item.tags.includes("subculture")) score += 5;
            if (userChoices.theme === "Food" && item.tags.includes("food")) score += 5;

            // 根據耐熱度加分
            if (userChoices.heat === "low" && item.tags.includes("indoor")) score += 3;
            if (userChoices.heat === "high" && item.tags.includes("outdoor")) score += 2;

            // 根據飲食類別偏好加分
            if (userChoices.dietType && item.tags.includes(userChoices.dietType)) score += 4;

            // 如果選素食，優先權重拉高素食特有任務
            if (userChoices.dietVeg === "veg" && item.tags.includes("veg")) score += 8;

            return { text: item.text, tags: item.tags, score: score };
        });

        // 3. 排序並取出前 6 名最符合偏好且不重複的任務
        scoredItems.sort((a, b) => b.score - a.score);
        return scoredItems.slice(0, 6);
    }

    function generateBingoCard() {
        dialogView.style.display = 'none';
        bingoView.style.display = 'flex';

        const grid = document.getElementById("bingo-grid");
        grid.innerHTML = "";

        const typeLabels = {
            magenta: '抽籤任務',
            yellow: '在地推薦',
            cyan: '指定地點',
            green: '自由探索'
        };

        // 依據玩家選擇各自計算四個池子的權重排序
        let finalMagenta = getFilteredAndScoredPool('magenta');
        let finalYellow = getFilteredAndScoredPool('yellow');
        let finalCyan = getFilteredAndScoredPool('cyan');
        let finalGreen = getFilteredAndScoredPool('green');

        // 平衡建立 24 格任務組合
        let typeDistribution = [];
        for(let i=0; i<6; i++) {
            typeDistribution.push('magenta', 'yellow', 'cyan', 'green');
        }
        typeDistribution = shuffleArray(typeDistribution);

        let selectedTasks = [];
        for (let i = 0; i < 24; i++) {
            let targetType = typeDistribution[i];
            let taskObj;
            if (targetType === 'magenta') taskObj = finalMagenta.pop();
            if (targetType === 'yellow') taskObj = finalYellow.pop();
            if (targetType === 'cyan') taskObj = finalCyan.pop();
            if (targetType === 'green') taskObj = finalGreen.pop();
            
            selectedTasks.push({ 
                type: targetType, 
                label: typeLabels[targetType], 
                text: taskObj.text 
            });
        }

        // 渲染 5x5 網格
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement("div");
            
            if (i === 12) {
                cell.className = "bingo-cell theme-white";
                cell.innerHTML = `
                    <div class="cell-type">起點/終點</div>
                    <div class="cell-desc">台北漫步旅店<br>MEANDER Taipei</div>
                `;
            } else {
                let task = selectedTasks.pop();
                cell.className = `bingo-cell theme-${task.type}`;
                cell.innerHTML = `
                    <div class="cell-type">${task.label}</div>
                    <div class="cell-desc">${task.text}</div>
                `;
            }

            cell.onclick = function() {
                this.classList.toggle("stamped");
            };

            grid.appendChild(cell);
        }
    }

    function restartGame() {
        userChoices = {}; // 重置選擇
        renderNode("Start");
    }

    function saveImage() {
        const element = document.getElementById('export-area');
        html2canvas(element, {
            backgroundColor: '#181818', 
            scale: 2 
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Ximending_QuestCard.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    window.onload = () => {
        renderNode("Start");
    };
</script>
