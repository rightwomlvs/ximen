<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西門町 AI 情報商對話系統</title>
    <style>
        /* 賽博龐克與西門町街頭風格設定 */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background-color: #0d0d0d; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
        }
        #game-container { 
            width: 100%; 
            max-width: 500px; 
            background: #1a1a1a; 
            min-height: 80vh; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #333;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.15); 
            border-radius: 10px;
            overflow: hidden;
        }
        .header { 
            background: #000; 
            padding: 20px; 
            text-align: center; 
            border-bottom: 2px solid #0ff; 
            font-weight: bold; 
            font-size: 1.2rem;
            letter-spacing: 2px; 
            color: #0ff; 
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8); 
        }
        .story-area {
            flex: 1;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, #2a2a2a 0%, #1a1a1a 100%);
        }
        .story-en {
            font-size: 1.1rem;
            color: #0ff;
            margin-bottom: 15px;
            font-weight: bold;
            line-height: 1.4;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.3);
        }
        .story-zh {
            font-size: 1rem;
            color: #bbb;
            line-height: 1.6;
        }
        .options-area {
            padding: 20px;
            background: #111;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-top: 1px solid #333;
        }
        .btn-option {
            background: transparent;
            color: #f0f;
            border: 2px solid #f0f;
            padding: 15px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 0 8px rgba(255, 0, 255, 0.2);
        }
        .btn-option:hover {
            background: #f0f;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.8);
        }
        .btn-restart {
            border-color: #0f0;
            color: #0f0;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.2);
        }
        .btn-restart:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
        }
        .status-bar {
            text-align: center;
            padding: 10px;
            font-size: 0.8rem;
            color: #666;
            background: #000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">📍 MEANDER TAVERN AI</div>
    
    <div class="story-area">
        <div class="story-en" id="text-en">Loading...</div>
        <div class="story-zh" id="text-zh">載入中...</div>
    </div>

    <div class="options-area" id="options-container">
        </div>
    
    <div class="status-bar">System Active // Ximending Grid Protocol</div>
</div>

<script>
    // 遊戲劇本資料庫 (JSON 格式)
    const storyData = {
        "Start": {
            en: "Welcome to Ximending! Make the whole world a grand game. I am your AI informant. Are you exploring this maze alone or with a guild?",
            zh: "歡迎來到西門町！讓整個世界成為一場盛大的遊戲。我是你的AI情報商，今天你是獨自探索這座迷宮，還是帶著公會夥伴？",
            options: [
                { text: "Solo 單刷", target: "Path_Solo" },
                { text: "Group 組隊", target: "Path_Group" }
            ]
        },
        "Path_Solo": {
            en: "A lone wolf! You can move fast and quiet. How much time do you have for this mission? A quick 1-hour rush, or a 3-hour deep dive?",
            zh: "一匹孤狼！你能移動得迅速且安靜。你這次任務有多少時間？1小時的快速突擊，還是3小時的深度潛入？",
            options: [
                { text: "1 Hour 快速突擊", target: "Budget_Fast" },
                { text: "3 Hours 深度潛入", target: "Budget_Slow" }
            ]
        },
        "Path_Group": {
            en: "A guild adventure! Teamwork is your best weapon. How much time does your team have? A quick 1-hour rush, or a 3-hour deep dive?",
            zh: "公會大冒險！團隊合作是你們最好的武器。隊伍有多少時間？1小時的快速突擊，還是3小時的深度潛入？",
            options: [
                { text: "1 Hour 快速突擊", target: "Budget_Fast" },
                { text: "3 Hours 深度潛入", target: "Budget_Slow" }
            ]
        },
        "Budget_Fast": {
            en: "Time is ticking! We need to move fast. What about your budget? Are we surviving on cheap street food, or do we have coins for a nice cafe?",
            zh: "時間緊迫！我們得加快腳步。你的預算如何？是要靠便宜的街邊小吃生存，還是有金幣去間好咖啡廳？",
            options: [
                { text: "Low Budget 街頭生存", target: "Theme_Street" },
                { text: "High Budget 準備揮霍", target: "Theme_Cafe" }
            ]
        },
        "Budget_Slow": {
            en: "We have plenty of time to explore every corner. Now, what about your budget? Are you saving money, or are you ready to spend your coins?",
            zh: "我們有充足的時間探索每個角落。那麼預算呢？是在省錢，還是準備大花一筆金幣？",
            options: [
                { text: "Low Budget 街頭生存", target: "Theme_Street" },
                { text: "High Budget 準備揮霍", target: "Theme_Cafe" }
            ]
        },
        "Theme_Street": {
            en: "Street smarts it is! Final question: Do you want to uncover the secrets of old History, or dive into the wild youth Subculture?",
            zh: "靠街頭智慧生存！最後一個問題：你想揭開古老歷史的秘密，還是潛入狂野的青年次文化？",
            options: [
                { text: "History 歷史遺跡", target: "End_Street_History" },
                { text: "Subculture 街頭次文化", target: "End_Street_Sub" }
            ]
        },
        "Theme_Cafe": {
            en: "Nice! You have enough resources. Final question: Do you prefer the elegant vibe of old History, or the energetic pulse of youth Subculture?",
            zh: "太棒了！你的資源充足。最後一個問題：你喜歡古老歷史的優雅氛圍，還是青年次文化的活力脈動？",
            options: [
                { text: "History 歷史遺跡", target: "End_Cafe_History" },
                { text: "Subculture 街頭次文化", target: "End_Cafe_Sub" }
            ]
        },
        "End_Street_History": {
            en: "Data processed! Here is your 5x5 Bingo Card: [The Boundary of Time]. Find the old marks at Ximen Station and meet me at MEANDER Taipei!",
            zh: "資料處理完畢！這是你的5x5副本：【時光邊界】。在西門站尋找舊日標記，最後在 MEANDER Taipei 見！",
            options: [
                { text: "Restart 重新開始", target: "Start", isRestart: true }
            ]
        },
        "End_Street_Sub": {
            en: "Data processed! Here is your 5x5 Bingo Card: [The Wild Streets]. Hunt for graffiti tags in America Street and claim your reward at MEANDER Taipei!",
            zh: "資料處理完畢！這是你的5x5副本：【野生街頭】。在美國街狩獵塗鴉標籤，最後回 MEANDER Taipei 領取獎勵！",
            options: [
                { text: "Restart 重新開始", target: "Start", isRestart: true }
            ]
        },
        "End_Cafe_History": {
            en: "Data processed! Here is your 5x5 Bingo Card: [Taste of the Decades]. Enjoy vintage cafes, explore the Red House, and celebrate at MEANDER Taipei!",
            zh: "資料處理完畢！這是你的5x5副本：【歲月尋味】。享受復古咖啡廳，探索紅樓，最後在 MEANDER Taipei 慶祝吧！",
            options: [
                { text: "Restart 重新開始", target: "Start", isRestart: true }
            ]
        },
        "End_Cafe_Sub": {
            en: "Data processed! Here is your 5x5 Bingo Card: [Neon & Beats]. Buy trendy gear, watch street dancers, and gather your guild at MEANDER Taipei!",
            zh: "資料處理完畢！這是你的5x5副本：【霓虹與節拍】。買些潮流裝備，觀賞街舞，最後在 MEANDER Taipei 集合吧！",
            options: [
                { text: "Restart 重新開始", target: "Start", isRestart: true }
            ]
        }
    };

    // 渲染遊戲節點的函數
    function renderNode(nodeId) {
        const node = storyData[nodeId];
        if (!node) return;

        // 更新文字
        document.getElementById("text-en").innerText = node.en;
        document.getElementById("text-zh").innerText = node.zh;

        // 清空並更新按鈕
        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";

        node.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = opt.isRestart ? "btn-option btn-restart" : "btn-option";
            btn.innerText = opt.text;
            btn.onclick = () => renderNode(opt.target);
            optionsContainer.appendChild(btn);
        });
    }

    // 遊戲啟動
    window.onload = () => {
        renderNode("Start");
    };
</script>
</body>
</html>
